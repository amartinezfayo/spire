syntax = "proto3";
package spire.types;
option go_package = "github.com/spiffe/spire/proto/spire/types";

message IdentityExchangeData {
    // The type of identity exchange data. This is typically the name of the plugin
    // that produced that data
    string type = 1;

    // The identity exchange data payload
    bytes payload = 2;
}
